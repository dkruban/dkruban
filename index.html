<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Profile | Interactive</title>
    <style>
        /* --- RESET & VARIABLES --- */
        :root {
            --bg-color: #050505;
            --card-bg: rgba(20, 20, 25, 0.6);
            --primary: #00f3ff; /* Cyan */
            --secondary: #bd00ff; /* Magenta */
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --font-stack: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-stack);
            overflow: hidden; /* Prevent scrollbars during animation */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px; /* Enable 3D space */
        }

        /* --- BACKGROUND CANVAS --- */
        #canvas-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* --- 3D CARD CONTAINER --- */
        .card-container {
            position: relative;
            z-index: 10;
            width: 350px;
            padding: 40px 20px;
            border-radius: 20px;
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.1);
            text-align: center;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out; /* Smooth tilt */
            animation: float 6s ease-in-out infinite;
        }

        /* Floating Animation */
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotateX(0deg); }
            50% { transform: translateY(-20px) rotateX(2deg); }
        }

        /* --- PROFILE CONTENT --- */
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary);
            box-shadow: 0 0 20px var(--primary);
            margin-bottom: 20px;
            transition: transform 0.5s ease;
        }

        .card-container:hover .profile-img {
            transform: scale(1.1) rotateZ(5deg);
            border-color: var(--secondary);
            box-shadow: 0 0 30px var(--secondary);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transform: translateZ(20px); /* 3D pop */
        }

        p.role {
            color: var(--primary);
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 15px;
            transform: translateZ(20px);
        }

        p.bio {
            color: var(--text-dim);
            font-size: 0.85rem;
            line-height: 1.5;
            margin-bottom: 30px;
            transform: translateZ(15px);
        }

        /* --- THE IMPRESSIVE BUTTON --- */
        .warp-btn {
            position: relative;
            display: inline-block;
            padding: 15px 40px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            color: var(--bg-color);
            background: var(--primary);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            overflow: hidden;
            transition: all 0.3s ease;
            transform: translateZ(30px); /* Pop out most */
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.4);
        }

        .warp-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.8), transparent);
            transition: 0.5s;
        }

        .warp-btn:hover {
            background: var(--secondary);
            color: #fff;
            box-shadow: 0 0 40px rgba(189, 0, 255, 0.6);
            transform: translateZ(35px) scale(1.05);
        }

        .warp-btn:hover::before {
            left: 100%;
        }

        /* Click Animation Class */
        .warp-active {
            animation: warpOut 1.5s forwards;
        }

        /* --- SOCIAL ICONS --- */
        .socials {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 15px;
            transform: translateZ(10px);
        }

        .social-link {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 1.2rem;
            transition: color 0.3s;
        }

        .social-link:hover {
            color: var(--primary);
            text-shadow: 0 0 10px var(--primary);
        }

        /* --- WARP SPEED ANIMATION KEYFRAMES --- */
        @keyframes warpOut {
            0% {
                transform: scale(1);
                opacity: 1;
                filter: blur(0);
            }
            50% {
                transform: scale(2);
                opacity: 0.8;
                filter: blur(5px);
            }
            100% {
                transform: scale(10);
                opacity: 0;
                filter: blur(20px);
            }
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 480px) {
            .card-container {
                width: 90%;
                padding: 30px 15px;
            }
        }
    </style>
</head>
<body>

    <!-- Background Animation Canvas -->
    <canvas id="canvas-bg"></canvas>

    <!-- Main Profile Card -->
    <main class="card-container" id="profileCard">
        <!-- Replace with your actual image URL -->
        <img src="https://picsum.photos/seed/cyberpunk/200/200" alt="Profile Avatar" class="profile-img">
        
        <h1 id="userName">RUBAN.M</h1>
        <p class="role">Full Stack Creator</p>
        <p class="bio">Building digital experiences with code and creativity.</p>

        <!-- The Massive Action Button -->
        <a href="https://your-portfolio-link.com" target="_blank" class="warp-btn" id="portfolioBtn">
            Enter Portfolio
        </a>

        <div class="socials">
            <a href="#" class="social-link" aria-label="GitHub">GH</a>
            <a href="#" class="social-link" aria-label="LinkedIn">IN</a>
            <a href="#" class="social-link" aria-label="Twitter">TW</a>
        </div>
    </main>

    <script>
        /**
         * 1. PARTICLE NETWORK ANIMATION
         * Creates a network of nodes that connect when close to each other.
         */
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let particlesArray;

        // Resize canvas to full screen
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Handle window resizing
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        });

        // Particle Class
        class Particle {
            constructor(x, y, directionX, directionY, size, color) {
                this.x = x;
                this.y = y;
                this.directionX = directionX;
                this.directionY = directionY;
                this.size = size;
                this.color = color;
                this.speedMultiplier = Math.random() * 0.5 + 0.2; // Variable speed
            }

            // Draw individual particle
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
            }

            // Update particle position
            update() {
                // Boundary checks (bounce off edges)
                if (this.x > canvas.width || this.x < 0) {
                    this.directionX = -this.directionX;
                }
                if (this.y > canvas.height || this.y < 0) {
                    this.directionY = -this.directionY;
                }

                // Move
                this.x += this.directionX * this.speedMultiplier;
                this.y += this.directionY * this.speedMultiplier;

                this.draw();
            }
        }

        // Initialize Particles
        function initParticles() {
            particlesArray = [];
            // Calculate number of particles based on screen size
            let numberOfParticles = (canvas.height * canvas.width) / 9000;
            
            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 2) + 1;
                let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                let directionX = (Math.random() * 2) - 1; // Speed range
                let directionY = (Math.random() * 2) - 1;
                let color = '#00f3ff'; // Cyan particles

                particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
            }
        }

        // Connect particles with lines if they are close enough
        function connect() {
            let opacityValue = 1;
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x)) +
                                   ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                    
                    if (distance < (canvas.width/7) * (canvas.height/7)) {
                        opacityValue = 1 - (distance / 20000);
                        ctx.strokeStyle = 'rgba(0, 243, 255,' + opacityValue + ')';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, innerWidth, innerHeight);

            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
            }
            connect();
        }

        /**
         * 2. 3D TILT EFFECT
         * Moves the card based on mouse position to give a 3D feel.
         */
        const card = document.getElementById('profileCard');
        const container = document.body;

        container.addEventListener('mousemove', (e) => {
            let xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            let yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            
            // Apply tilt to the card, overriding the float animation momentarily if needed
            // We use inline styles here for performance during mousemove
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        // Reset when mouse leaves
        container.addEventListener('mouseleave', () => {
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
            // Re-trigger float by removing the inline style essentially, 
            // but the CSS animation 'float' needs to be carefully managed.
            // For simplicity, we keep the last tilt or let the CSS animation take over on hover out.
            // A cleaner way is to remove the style property:
            card.style.transform = ""; 
        });

        /**
         * 3. WARP SPEED CLICK EFFECT
         * When button is clicked, explode the screen and then open link.
         */
        const btn = document.getElementById('portfolioBtn');
        
        btn.addEventListener('click', (e) => {
            e.preventDefault(); // Stop immediate navigation
            
            // Get the actual URL from the href
            const targetUrl = btn.getAttribute('href');

            // Add visual effects
            document.body.classList.add('warp-active'); // If we added body styles
            card.classList.add('warp-active');

            // Speed up particles drastically for "Warp" effect
            particlesArray.forEach(p => {
                p.directionX *= 20;
                p.directionY *= 20;
                p.color = '#ffffff'; // White streaks
            });

            // Wait for animation to finish, then navigate
            setTimeout(() => {
                window.open(targetUrl, '_blank');
                
                // Reset (optional, since page will likely change)
                card.classList.remove('warp-active');
                initParticles(); 
            }, 800); // 0.8 seconds delay
        });

        // Start everything
        initParticles();
        animate();

    </script>
</body>
</html>
